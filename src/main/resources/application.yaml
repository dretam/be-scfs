server:
  port: ${SERVER_PORT:8080}

jwt:
  algorithm: ${JWT_ALGORITHM:HmacSHA256}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  secret: ${JWT_SECRET}
  expires-seconds: ${JWT_EXPIRES_SECONDS:10}

spring:
  config:
    import: optional:file:./.env[.properties],optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: ${SPRING_APPLICATION_NAME}
  mvc:
    static-path-pattern: "/static/**"
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAXFILESIZE:1MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAXREQUESTSIZE:10MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    driver-class-name: ${SPRING_DATASOURCE_DRIVERCLASSNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        show_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_SHOW_SQL:false}
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}
  flyway:
    locations: ${SPRING_FLYWAY_LOCATIONS}
    validate-migration-naming: true
    table: "migrations"
    out-of-order: true
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        debug: ${SPRING_PROPERTIES_MAIL_DEBUG}
        smtp:
          auth: ${SPRING_PROPERTIES_SMTP_AUTH}
          starttls:
            enable: ${SPRING_PROPERTIES_SMTP_STARTTLS_ENABLE}

db-scheduler:
  enabled: true
  polling-interval: 5s
  immediate-execution-enabled: true
  polling-strategy: lock_and_fetch
  table-name: scheduled_tasks

db-scheduler-log:
  enabled: true
  table-name: scheduled_logs

db-scheduler-ui:
  enabled: true
  history: true
  log-limit: 500
  read-only: false

springdoc:
  writer-with-default-pretty-printer: on
  model-converters:
    pageable-converter:
      enabled: on
  api-docs:
    enabled: true
  swagger-ui:
    urls:
      - name: v1
        url: /v3/api-docs/v1
        display-name: Version 1
    groups-order: DESC
    display-request-duration: true
    enabled: on
    persist-authorization: on
    filter: true
    syntax-highlight:
      theme: monokai
    path: /swagger-ui.html
  group-configs:
    - group: v1
      display-name: Version 1
      paths-to-match:
        - /api/v1/**
        - /db-scheduler-api/**

aws:
  s3:
    access-key-id: ${AWS_S3_ACCESS_KEY_ID}
    secret-access-key: ${AWS_S3_SECRET_ACCESS_KEY}
    region: ${AWS_S3_REGION}
    bucket-name: ${AWS_S3_BUCKET_NAME}
    endpoint: ${AWS_S3_ENDPOINT:} # Optional, for custom endpoints like MinIO

openapi:
  host: ${OPEN_API_HOST}
  host_url: ${OPEN_API_HOST_URL}
  client_id: ${OPEN_API_CLIENT_ID}
  client_secret: ${OPEN_API_CLIENT_SECRET}

ocr:
  url: ${OCR_URL}
  partner-id: ${OCR_PARTNER_ID}
  channel-id: ${OCR_CHANNEL_ID}
  api-version: ${OCR_API_VERSION}
  host: ${OCR_HOST}

ldap:
  url: ${LDAP_SERVICE_URL}
  host: ${LDAP_HOST}
  client-secret: ${LDAP_CLIENT_SECRET}
  aes_key: ${LDAP_AES_KEY}
  partner_id: ${LDAP_PARTNER_ID}
  channel_id: ${LDAP_CHANNEL_ID}
  encrypt_type: ${LDAP_ENCRYPT_VERSION}
  host_url: ${LDAP_HOST_URL}
  token_username: ${LDAP_TOKEN_USERNAME}
  token_password: ${LDAP_TOKEN_PASSWORD}
  client_id: ${LDAP_CLIENT_ID}

resilience4j:
  ratelimiter:
    instances:
      global:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0

logging:
  level:
    org:
      springframework: INFO
    com:
      github:
        kagkarlsson:
          scheduler: DEBUG

management:
  endpoint:
    health:
      show-details: when_authorized
      roles:
        - APP
        - SU
        - ADMIN